name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Verify Next.js build
    runs-on: ubuntu-latest

    env:
      # Variables falsas para que el build no falle en CI.
      # En produccion las pone Vercel desde su panel.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_SENTRY_DSN: ''
      # INTERNAL_API_KEY (sin NEXT_PUBLIC_) la usa /api/bot-proxy en runtime, no en build.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build
